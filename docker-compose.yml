services:
  backend:
    build:
      context: .
      dockerfile: styleme-backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - styleme-backend/.env
    environment:
      MONGODB_URL: mongodb://host.docker.internal:27017
      ML_MODELS_PATH: /app/models
      UPLOADS_PATH: /app/uploads
    volumes:
      - ./styleme-backend/uploads:/app/uploads
      - u2net-cache:/root/.u2net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  u2net-cache:
